<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>乗れるバス、何本後？ - 検索結果</title>
        <link rel="stylesheet" href="style/yuttarinavi.css">
    </head>
    <body>
        <div class="navi-wrapper">
            <div class="navi-container">
                
                <div class="result-title-box">
                    <h2>結果</h2>
                </div>

                <div class="bus-result-message">
                    <p>あなたが<br>乗れるバスは、</p>
                    <div class="highlight-buses">
                        <span class="circle-placeholder">〇</span>
                        <span class="text-suffix">本後です</span>
                    </div>
                </div>

                <div class="estimated-time">
                    推測される所要時間は〇分です
                </div>

                <div class="section-divider route-divider">
                    <span>あなたのルート</span>
                </div>

                <div class="route-display bus-route-display">
                    <div class="form-group read-only">
                        <label>出発</label>
                        <div class="input-display">京都駅</div>
                    </div>

                    <div class="form-group read-only">
                        <label>系統</label>
                        <div class="input-display">206号系統</div>
                    </div>

                    <div class="form-group read-only">
                        <label>並び</label>
                        <div class="input-display">前に--人</div>
                    </div>

                    <div class="form-group read-only">
                        <label class="label-multiline"><span>乗車<br>人数</span></label>
                        <div class="input-display">一度に--人</div>
                    </div>
                </div>

                <div class="submit-wrapper">
                    <button type="button" class="btn-research">条件を変更で再検索</button>
                </div>

            </div>
        </div>
    </body>
</html>
