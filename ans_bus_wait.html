<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>乗れるバス、何本後？ - 検索結果</title>
        <link rel="stylesheet" href="style/yuttarinavi.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
        <script src="./src/queue_est.js" defer></script>
    </head>
    <body>
        <div class="navi-wrapper">
            <div class="navi-container">
                
                <div class="result-title-box">
                    <h2>結果</h2>
                </div>

                <div class="bus-result-message" id="resultArea">
                    <p>計算中...</p>
                </div>

                <div class="estimated-time" id="timeArea">
                    </div>

                <div class="section-divider route-divider">
                    <span>あなたのルート</span>
                </div>

                <div class="route-display bus-route-display">
                    <div class="form-group read-only">
                        <label>出発</label>
                        <div class="input-display" id="disp-station">--</div>
                    </div>

                    <div class="form-group read-only">
                        <label>系統</label>
                        <div class="input-display" id="disp-route">--</div>
                    </div>

                    <div class="form-group read-only">
                        <label>行き先</label>
                        <div class="input-display" id="disp-dest">--</div>
                    </div>

                    <div class="form-group read-only">
                        <label>並び</label>
                        <div class="input-display" id="disp-queue">--</div>
                    </div>

                    <div class="form-group read-only">
                        <label class="label-multiline"><span>乗車<br>人数</span></label>
                        <div class="input-display" id="disp-capacity">--</div>
                    </div>
                </div>

                <div class="submit-wrapper">
                    <button type="button" class="btn-research" id="backBtn">条件を変更して再検索</button>
                </div>

            </div>
        </div>
    </body>
</html>
