<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>乗れるバス、何本後？</title>
        <link rel="stylesheet" href="style/yuttarinavi.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
        <script src="./src/tools.js"></script>
        <script src="./src/queue_est.js" defer></script>
    </head>
    <body>
        <div class="navi-wrapper">
            <div class="navi-container">
                
                <header class="navi-header bus-wait-header">
                    <h1>乗れるバス、<br>何本後？</h1>
                </header>

                <form class="navi-form bus-wait-form" id="searchForm">
                    <div id="status-area" class="loading" style="display: none;">データを読み込み中...</div>
                    
                    <div class="form-group">
                        <label for="departure">出発</label>
                        <div class="select-wrapper">
                            <select id="departure" name="departure" required>
                                <option value="">--停留所を選択してください--</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="route">系統</label>
                        <div class="select-wrapper">
                            <select id="route" name="route" disabled required>
                                <option value="">-- 先に停留所を選んでください --</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="destination">行き先</label>
                        <div class="select-wrapper">
                            <select id="destination" name="destination" disabled required>
                                <option value="">-- 先に系統を選んでください --</option>
                            </select>
                        </div>
                    </div>
                    <small>画像からも、並んでいる人数を推定できます。</small>
                    <div class="form-group">
                        <label for="queue">並び</label>
                        <div class="select-wrapper no-arrow">
                            <!--select id="queue" name="queue" required>
                                <option value="" selected>前に--人</option>
                                <option value="0">前に0人</option>
                                <option value="5">前に5人</option>
                                <option value="10">前に10人</option>
                                <option value="20">前に20人</option>
                                <option value="30">前に30人</option>
                                <option value="50">前に50人</option>
                                <option value="100">前に100人</option>
                            </select-->
                            <input type = "number" id = "queue" name = "queue" min = "0" max = "300" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="queue">画像</label>
                        <div class="select-wrapper">
                            <input type = "file" id = "img_queue">
                        </div>
                    </div>
                    <div class="form-group" style="height: auto;">
                        <img id="resultImg" style="width: 100%;" />
                    </div>

                    <div class="form-group">
                        <label for="capacity" class="label-multiline"><span>乗車<br>人数</span></label>
                        <div class="select-wrapper no-arrow">
                            <input type="number" id="capacity" name="capacity" value="30" min="1" max="100" required>
                        </div>
                    </div>

                    <div class="submit-wrapper">
                        <button class="btn-submit" id="calcBtn">検索</button>
                    </div>
                </form>

            </div>
            <div class="back-btn-wrapper">
                <a href="index.html" class="btn-back">
                    <span class="chevron-left"></span>
                </a>
            </div>
        </div>
    </body>
</html>
