<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ゆったりナビ - 検索結果</title>
        <link rel="stylesheet" href="style/yuttarinavi.css">
    </head>
    <body>
        <div class="navi-wrapper">
            <div class="navi-container">
                <header class="navi-header result-header">
                    <h1>京都ゆったりナビ</h1>
                </header>

                <div class="result-title-box">
                    <h2>結果</h2>
                </div>

                <div class="result-conditions">
                    〇月〇日　00:00発　晴れ
                </div>

                <div class="route-display">
                    <div class="form-group read-only">
                        <label>出発</label>
                        <div class="input-display"></div>
                    </div>

                    <div class="via-wrapper">
                        <button type="button" class="btn-via">＋経由</button>
                    </div>

                    <div class="form-group read-only">
                        <label>到着</label>
                        <div class="input-display"></div>
                    </div>
                </div>

                <div class="result-message">
                    <p>このルートだと、<br>通常よりも</p>
                    <div class="highlight-time">
                        <span class="circle-placeholder">〇〇</span>
                        <span class="small-text">分快適に</span>
                    </div>
                </div>

                <div class="submit-wrapper">
                    <button type="button" class="btn-research">条件を変更で再検索</button>
                </div>

            </div>
        </div>
    </body>
</html>
