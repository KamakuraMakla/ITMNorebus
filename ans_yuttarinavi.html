<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ゆったりナビ - 検索結果</title>
        <link rel="stylesheet" href="style/yuttarinavi.css">
        <link rel="stylesheet" href="style/ans_yuttarinavi.css">
    </head>
    <body>
        <div class="navi-wrapper">
            <div class="navi-container">
                <header class="navi-header result-header">
                    <h1>京都ゆったりナビ</h1>
                </header>
                <div class="result-title-box"><h2>結果</h2></div>
                <div class="result-conditions" id="display-conditions">データを読み込み中...</div>
                <div class="result-message">
                    <p>このルートだと、<br>通常よりも</p>
                    <div class="highlight-time" style="font-size: 1.2rem; margin-top: 15px;">
                        混雑スコアが <span class="circle-placeholder" id="total-diff" style="margin: 0 10px;">--</span> 軽減
                    </div>
                    <div id="score-details-area" class="score-details-box">
                        <span style="font-size: 0.8rem; color: #ddd;">計算データを読み込み中...</span>
                    </div>
                </div>
                <div class="route-output-area" id="route-output-area"></div>
                <div class="submit-wrapper">
                    <button type="button" class="btn-research" onclick="location.href='yuttarinavi.html'">条件を変更で再検索</button>
                </div>
            </div>
        </div>
        <script src="src/all_conditions_data.js"></script>
        <script src="src/app.js"></script>
    </body>
</html>
